name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Supabase public vars are hardcoded (anon key is safe to expose publicly)
      # Instagram credentials come from GitHub Secrets (sensitive)
      - name: Create .env for build
        run: |
          echo 'VITE_SUPABASE_PROJECT_ID="zakdypwlmpusslvmnmds"' >> .env
          echo 'VITE_SUPABASE_PUBLISHABLE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpha2R5cHdsbXB1c3Nsdm1ubWRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MDcxNzQsImV4cCI6MjA5ODM4MzE3NH0.Ladn11duuuRUiJ3cr3DWYCfI9fIfwlsV7IWMQqbAaYg"' >> .env
          echo 'VITE_SUPABASE_URL="https://zakdypwlmpusslvmnmds.supabase.co"' >> .env
          echo "VITE_INSTAGRAM_USER_ID=${{ secrets.INSTAGRAM_USER_ID }}" >> .env
          echo "VITE_INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}" >> .env

      - run: npm ci && npm run build

      - name: Diagnostic check of Firebase service account secret
        env:
          SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SARAVANANLIC }}
        run: |
          node -e "
          const sa = process.env.SERVICE_ACCOUNT;
          if (!sa) {
            console.error('Error: Secret is empty or not set!');
            process.exit(1);
          }
          console.log('Secret length:', sa.length);
          try {
            const parsed = JSON.parse(sa);
            console.log('Parsed as JSON successfully!');
            console.log('JSON Keys:', Object.keys(parsed));
            if (parsed.private_key) {
              console.log('Private key length:', parsed.private_key.length);
              console.log('Private key starts with:', parsed.private_key.substring(0, 30));
              console.log('Private key ends with:', parsed.private_key.substring(parsed.private_key.length - 30).replace(/\n/g, '\\n'));
              console.log('Contains real newlines:', parsed.private_key.includes('\n'));
              console.log('Contains literal backslash-n:', parsed.private_key.includes('\\n'));
            } else {
              console.error('Error: private_key field is missing in JSON!');
            }
          } catch (e) {
            console.log('Failed to parse as JSON:', e.message);
            console.log('First 50 chars of secret:', sa.substring(0, 50));
            console.log('Last 50 chars of secret:', sa.substring(sa.length - 50));
          }
          "

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SARAVANANLIC }}
          projectId: saravananlic
          channelId: live

  deploy_supabase_functions:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Only runs if SUPABASE_ACCESS_TOKEN secret is set in GitHub
      - name: Set Supabase secrets from GitHub Secrets
        if: env.SUPABASE_ACCESS_TOKEN != ''
        run: |
          supabase secrets set \
            INSTAGRAM_USER_ID=${{ secrets.INSTAGRAM_USER_ID }} \
            INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }} \
            --project-ref zakdypwlmpusslvmnmds

      - name: Deploy instagram-feed function
        if: env.SUPABASE_ACCESS_TOKEN != ''
        run: |
          supabase functions deploy instagram-feed \
            --project-ref zakdypwlmpusslvmnmds
