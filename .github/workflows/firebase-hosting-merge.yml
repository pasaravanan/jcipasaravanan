name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Supabase public vars are hardcoded (anon key is safe to expose publicly)
      # Instagram credentials come from GitHub Secrets (sensitive)
      - name: Create .env for build
        run: |
          echo 'VITE_SUPABASE_PROJECT_ID="zakdypwlmpusslvmnmds"' >> .env
          echo 'VITE_SUPABASE_PUBLISHABLE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpha2R5cHdsbXB1c3Nsdm1ubWRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MDcxNzQsImV4cCI6MjA5ODM4MzE3NH0.Ladn11duuuRUiJ3cr3DWYCfI9fIfwlsV7IWMQqbAaYg"' >> .env
          echo 'VITE_SUPABASE_URL="https://zakdypwlmpusslvmnmds.supabase.co"' >> .env
          echo "VITE_INSTAGRAM_USER_ID=${{ secrets.INSTAGRAM_USER_ID }}" >> .env
          echo "VITE_INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}" >> .env

      - run: npm ci && npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
          projectId: jcipasaravanan
          channelId: live

  deploy_supabase_functions:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Only runs if SUPABASE_ACCESS_TOKEN secret is set in GitHub
      - name: Set Supabase secrets from GitHub Secrets
        if: env.SUPABASE_ACCESS_TOKEN != ''
        run: |
          supabase secrets set \
            INSTAGRAM_USER_ID=${{ secrets.INSTAGRAM_USER_ID }} \
            INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }} \
            --project-ref zakdypwlmpusslvmnmds

      - name: Deploy instagram-feed function
        if: env.SUPABASE_ACCESS_TOKEN != ''
        run: |
          supabase functions deploy instagram-feed \
            --project-ref zakdypwlmpusslvmnmds
